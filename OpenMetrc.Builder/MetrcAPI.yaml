          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  Name:
                    type: string
                  AdditiveType:
                    type: string
                  ApplicationDevice:
                    type: string
                  EpaRegistrationNumber:
                    type: string
                    format: color
                  Note:
                    type: string
                  ProductSupplier:
                    type: string
                  ProductTradeName:
                    type: string
                  RestrictiveEntryIntervalQuantityDescription:
                    type: string
                    format: utc-millisec
                  RestrictiveEntryIntervalTimeDescription:
                    type: string
                  ActiveIngredients:
                    type: array
                    items:
                      type: object
                      properties:
                        Name:
                          type: string
                        Percentage:
                          type: number
            example:
              - Name: Additive 1
                AdditiveType: Fertilizer
                ApplicationDevice: Sprayer
                EpaRegistrationNumber: '123456'
                Note: This is a note
                ProductSupplier: Supplier
                ProductTradeName: Trade Name
                RestrictiveEntryIntervalQuantityDescription: '1'
                RestrictiveEntryIntervalTimeDescription: 1 day
                ActiveIngredients:
                  - Name: Ingredient 1 1
                    Percentage: 1.1
                  - Name: Ingredient 1 2
                    Percentage: 1.2
              - Name: Additive 2
                AdditiveType: Pesticide
                ApplicationDevice: Dropper
                EpaRegistrationNumber: '654321'
                Note: This is a note
                ProductSupplier: Supplier
                ProductTradeName: Trade Name
                RestrictiveEntryIntervalQuantityDescription: '2'
                RestrictiveEntryIntervalTimeDescription: 2 days
                ActiveIngredients:
                  - Name: Ingredient 2 1
                    Percentage: 2.1
                  - Name: Ingredient 2 2
                    Percentage: 2.2

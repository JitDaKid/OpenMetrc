swagger: 2.0
info:
  title: METRC API
  version: v2
paths:
  /additivestemplates/v2/active:
    get:
      tags:
      - AdditivesTemplates
      summary: ''
      description: 'Retrieves a list of active additive templates for a specified Facility.<br/><b>Permissions Required</b>: Manage Additives'
      operationId: GetAdditivesTemplatesActive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of active additives.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: The last modified start timestamp
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: The last modified end timestamp
        format: date-time
      responses:
        200:
          description: Ok
  /additivestemplates/v2/inactive:
    get:
      tags:
      - AdditivesTemplates
      summary: ''
      description: 'Retrieves a list of inactive additive templates for a specified Facility.<br/><b>Permissions Required</b>: Manage Additives'
      operationId: GetAdditivesTemplatesInactive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of inactive additives.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: ''
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: ''
        format: date-time
      responses:
        200:
          description: Ok
  /additivestemplates/v2/{id}:
    get:
      tags:
      - AdditivesTemplates
      summary: ''
      description: 'Retrieves an Additive Template by its Id.<br/><b>Permissions Required</b>: Manage Additives'
      operationId: GetAdditivesTemplatesById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        description: If specified, the Additive will be validated against the specified License Number. If not specified, the Additive will be validated against all of the User's current Facilities. Please note that if the Additive is not valid for the specified License Number, a 401 Unauthorized status will be returned.
        format: ''
      responses:
        200:
          description: Ok
  /additivestemplates/v2/:
    post:
      tags:
      - AdditivesTemplates
      summary: ''
      description: 'Creates new additive templates for a specified Facility.<br/><b>Permissions Required</b>: Manage Additives'
      operationId: PostAdditivesTemplates
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to record the list of additives.
        format: ''
      responses:
        200:
          description: Ok
    put:
      tags:
      - AdditivesTemplates
      summary: ''
      description: 'Updates existing additive templates for a specified Facility.<br/><b>Permissions Required</b>: Manage Additives'
      operationId: PutAdditivesTemplates
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to update the list of additives.
        format: ''
      responses:
        200:
          description: Ok
  /caregivers/v2/status/{caregiverLicenseNumber}:
    get:
      tags:
      - CaregiversStatus
      summary: ''
      description: 'Retrieves the status of a Caregiver by their License Number for a specified Facility. Data returned by this endpoint is cached for up to one minute.<br/><b>Permissions Required</b>: Lookup Caregivers'
      operationId: GetCaregiversStatus
      parameters:
      - type: string
        name: caregiverLicenseNumber
        in: path
        required: true
        format: ''
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility under which to get the Caregiver status.
        format: ''
      responses:
        200:
          description: Ok
  /employees/v2/:
    get:
      tags:
      - Employees
      summary: ''
      description: 'Retrieves a list of employees for a specified Facility.<br/><b>Permissions Required</b>: Manage Employees • View Employees'
      operationId: GetEmployees
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility under which to get the employees.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      responses:
        200:
          description: Ok
  /employees/v2/permissions:
    get:
      tags:
      - Employees
      summary: ''
      description: 'Retrieves the permissions of a specified Employee, identified by their Employee License Number, for a given Facility.<br/><b>Permissions Required</b>: Manage Employees'
      operationId: GetEmployeesPermissions
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility under which to get the Employee.
        format: ''
      - type: string
        name: employeeLicenseNumber
        in: query
        required: true
        description: The License Number of the Employee under which to get the Permission.
        format: ''
      responses:
        200:
          description: Ok
  /facilities/v2/:
    get:
      tags:
      - Facilities
      summary: A Facility represents a building licensed for the growing, processing, and/or selling of product.
      description: 'This endpoint provides a list of facilities for which the authenticated user has access.<br/><b>Permissions Required</b>: <i>none</i>'
      operationId: GetFacilities
      responses:
        200:
          description: Ok
  /harvests/v2/waste/{id}:
    delete:
      tags:
      - Harvests
      summary: ''
      description: 'Discontinues a specific harvest waste record by Id for the specified Facility.<br/><b>Permissions Required</b>: View Harvests • Discontinue Harvest Waste'
      operationId: DeleteHarvestsWasteById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests waste.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/active:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a list of active harvests for a specified Facility.<br/><b>Permissions Required</b>: View Harvests'
      operationId: GetHarvestsActive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of active harvests.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: The last modified start timestamp
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: The last modified end timestamp
        format: date-time
      responses:
        200:
          description: Ok
  /harvests/v2/inactive:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a list of inactive harvests for a specified Facility.<br/><b>Permissions Required</b>: View Harvests'
      operationId: GetHarvestsInactive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of inactive harvests.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: The last modified start timestamp
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: The last modified end timestamp
        format: date-time
      responses:
        200:
          description: Ok
  /harvests/v2/onhold:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a list of harvests on hold for a specified Facility.<br/><b>Permissions Required</b>: View Harvests'
      operationId: GetHarvestsOnHold
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests on hold.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: The last modified start timestamp
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: The last modified end timestamp
        format: date-time
      responses:
        200:
          description: Ok
  /harvests/v2/waste:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a list of Waste records for a specified Harvest, identified by its Harvest Id, within a Facility identified by its License Number.<br/><b>Permissions Required</b>: View Harvests'
      operationId: GetHarvestsWaste
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of waste harvests.
        format: ''
      - type: integer
        name: harvestId
        in: query
        required: true
        description: The harvestId is the unique identifier for each harvest.
        format: int64
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      responses:
        200:
          description: Ok
    post:
      tags:
      - Harvests
      summary: ''
      description: 'Records Waste from harvests for a specified Facility. NOTE: The IDs passed in the request body are the harvest IDs for which you are documenting waste.<br/><b>Permissions Required</b>: View Harvests • Manage Harvests'
      operationId: PostHarvestsWaste
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests waste.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/waste/types:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a list of Waste types for harvests.<br/><b>Permissions Required</b>: <i>none</i>'
      operationId: GetHarvestsWasteTypes
      parameters:
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      responses:
        200:
          description: Ok
  /harvests/v2/{id}:
    get:
      tags:
      - Harvests
      summary: ''
      description: 'Retrieves a Harvest by its Id, optionally validated against a specified Facility License Number.<br/><b>Permissions Required</b>: View Harvests'
      operationId: GetHarvestsById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        description: If specified, the Harvest will be validated against the specified License Number. If not specified, the Harvest will be validated against all of the User's current Facilities. Please note that if the Harvest is not valid for the specified License Number, a 401 Unauthorized status will be returned.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/packages:
    post:
      tags:
      - Harvests
      summary: ''
      description: 'Creates packages from harvested products for a specified Facility.<br/><b>Permissions Required</b>: View Harvests • Manage Harvests • View Packages • Create/Submit/Discontinue Packages'
      operationId: PostHarvestsPackages
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests packages.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/packages/testing:
    post:
      tags:
      - Harvests
      summary: ''
      description: 'Creates packages for testing from harvested products for a specified Facility.<br/><b>Permissions Required</b>: View Harvests • Manage Harvests • View Packages • Create/Submit/Discontinue Packages'
      operationId: PostHarvestsPackagesTesting
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests packages.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/finish:
    put:
      tags:
      - Harvests
      summary: ''
      description: 'Marks one or more harvests as finished for the specified Facility.<br/><b>Permissions Required</b>: View Harvests • Finish/Discontinue Harvests'
      operationId: PutHarvestsFinish
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of finished harvests.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/location:
    put:
      tags:
      - Harvests
      summary: ''
      description: 'Updates the Location of Harvest for a specified Facility.<br/><b>Permissions Required</b>: View Harvests • Manage Harvests'
      operationId: PutHarvestsLocation
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests locations.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/rename:
    put:
      tags:
      - Harvests
      summary: ''
      description: 'Renames one or more harvests for the specified Facility.<br/><b>Permissions Required</b>: View Harvests • Manage Harvests'
      operationId: PutHarvestsRename
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of renamed harvests.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/restore/harvestedplants:
    put:
      tags:
      - Harvests
      summary: ''
      description: 'Restores previously harvested plants to their original state for the specified Facility.<br/><b>Permissions Required</b>: View Harvests • Finish/Discontinue Harvests'
      operationId: PutHarvestsRestoreHarvestedPlants
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of harvests restored.
        format: ''
      responses:
        200:
          description: Ok
  /harvests/v2/unfinish:
    put:
      tags:
      - Harvests
      summary: ''
      description: 'Reopens one or more previously finished harvests for the specified Facility.<br/><b>Permissions Required</b>: View Harvests • Finish/Discontinue Harvests'
      operationId: PutHarvestsUnfinish
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of unfinished harvests.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/brand/{id}:
    delete:
      tags:
      - Items
      summary: ''
      description: 'Archives the specified Item Brand by Id for the given Facility License Number.<br/><b>Permissions Required</b>: Manage Items'
      operationId: DeleteItemsBrandById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for the Item Brand to delete.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/{id}:
    delete:
      tags:
      - Items
      summary: ''
      description: 'Archives the specified Product by Id for the given Facility License Number.<br/><b>Permissions Required</b>: Manage Items'
      operationId: DeleteItemsById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for the Item to delete.
        format: ''
      responses:
        200:
          description: Ok
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves detailed information about a specific Item by Id.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        description: If specified, the Item will be validated against the specified License Number. If not specified, the Item will be validated against all of the User's current Facilities. Please note that if the Item is not valid for the specified License Number, a 401 Unauthorized status will be returned.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/active:
    get:
      tags:
      - Items
      summary: ''
      description: 'Returns a list of active items for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsActive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of active items.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: lastModifiedStart
        in: query
        description: The last modified start timestamp
        format: date-time
      - type: string
        name: lastModifiedEnd
        in: query
        description: The last modified end timestamp
        format: date-time
      responses:
        200:
          description: Ok
  /items/v2/brands:
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves a list of active item brands for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsBrands
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of active item brands.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      responses:
        200:
          description: Ok
  /items/v2/categories:
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves a list of item categories.<br/><b>Permissions Required</b>: <i>none</i>'
      operationId: GetItemsCategories
      parameters:
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      - type: string
        name: licenseNumber
        in: query
        description: If specified, the categories will be retrieved for the specified License Number. If not specified, all item categories will be returned.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/file/{id}:
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves a file by its Id for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsFileById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        description: The License Number of the Facility for which to return the file.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/inactive:
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves a list of inactive items for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsInactive
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to return the list of inactive items.
        format: ''
      - type: integer
        name: pageNumber
        in: query
        description: The number of the data page from which to return data.
        format: int32
      - type: integer
        name: pageSize
        in: query
        description: The number of records to return per page. Pagination is currently disabled by default. You can enable pagination on this query by specifying a value that does not exceed 20.
        format: int32
      responses:
        200:
          description: Ok
  /items/v2/photo/{id}:
    get:
      tags:
      - Items
      summary: ''
      description: 'Retrieves an image by its Id for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: GetItemsPhotoById
      parameters:
      - type: integer
        name: id
        in: path
        required: true
        format: int64
      - type: string
        name: licenseNumber
        in: query
        description: The License Number of the Facility for which to return the image.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/:
    post:
      tags:
      - Items
      summary: ''
      description: 'Creates one or more new products for the specified Facility. NOTE: To include a photo with an item, first use POST /items/v2/photo to POST the photo, and then use the returned Id in the request body in this endpoint.<br/><b>Permissions Required</b>: Manage Items'
      operationId: PostItems
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for which to create new items.
        format: ''
      responses:
        200:
          description: Ok
    put:
      tags:
      - Items
      summary: ''
      description: 'Updates one or more existing products for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: PutItems
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for the Item updates.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/brand:
    post:
      tags:
      - Items
      summary: ''
      description: 'Creates one or more new item brands for the specified Facility identified by the License Number.<br/><b>Permissions Required</b>: Manage Items'
      operationId: PostItemsBrand
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for the Item Brands to create.
        format: ''
      responses:
        200:
          description: Ok
    put:
      tags:
      - Items
      summary: ''
      description: 'Updates one or more existing item brands for the specified Facility.<br/><b>Permissions Required</b>: Manage Items'
      operationId: PutItemsBrand
      parameters:
      - type: string
        name: licenseNumber
        in: query
        required: true
        description: The License Number of the Facility for the Item Brand updates.
        format: ''
      responses:
        200:
          description: Ok
  /items/v2/file:
    post:
      tags:
